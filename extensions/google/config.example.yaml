# Google APIs Extension Configuration
# Rename to google-apis.yaml and place in config/

google_apis:
  # PageSpeed Insights API v5
  pagespeed:
    enabled: true
    api_key: ${GOOGLE_PAGESPEED_API_KEY}
    categories:
      - performance
      - accessibility
      - best-practices
      - seo
    strategies:
      - mobile
      - desktop
    
  # Chrome UX Report API
  crux:
    enabled: true
    api_key: ${GOOGLE_CRUX_API_KEY}
    metrics:
      - largest_contentful_paint
      - first_input_delay
      - cumulative_layout_shift
      - interaction_to_next_paint
      - first_contentful_paint
      - time_to_first_byte
    form_factors:
      - PHONE
      - DESKTOP
      - TABLET
    
  # Google Search Console API
  search_console:
    enabled: true
    auth_method: oauth2
    credentials_path: config/credentials/credentials.json
    token_path: config/credentials/token.json
    scopes:
      - https://www.googleapis.com/auth/webmasters.readonly
    default_dimensions:
      - query
      - page
      - device
    default_row_limit: 25000
    
  # Google Analytics 4 API
  analytics:
    enabled: false  # Optional
    property_id: ${GA4_PROPERTY_ID}
    credentials_path: config/credentials/service-account.json
    dimensions:
      - pagePath
      - deviceCategory
      - source
    metrics:
      - sessions
      - pageviews
      - bounceRate
      - averageSessionDuration

  # Rate limiting
  rate_limits:
    pagespeed: 25000  # requests/day
    crux: 150  # requests/minute
    search_console: 600  # requests/minute
    analytics: 10  # queries/second
    
  # Caching
  cache:
    enabled: true
    ttl:
      pagespeed: 86400  # 24 hours
      crux: 604800  # 7 days
      search_console: 43200  # 12 hours
      analytics: 3600  # 1 hour

version: '3.8'

services:
  claude-seo:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: claude-seo-unified
    environment:
      - PYTHONUNBUFFERED=1
      # LLM Provider (choose one)
      # - OLLAMA_HOST=host.docker.internal:11434
      # - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      # - OPENAI_API_KEY=${OPENAI_API_KEY}
      
      # Performance Provider
      - GOOGLE_PAGESPEED_API_KEY=${GOOGLE_PAGESPEED_API_KEY:-}
      
      # SERP Provider (optional)
      # - SERPAPI_KEY=${SERPAPI_KEY}
      # - DATAFORSEO_USER=${DATAFORSEO_USER}
      # - DATAFORSEO_PASSWORD=${DATAFORSEO_PASSWORD}
      
      # Analytics (optional)
      - GOOGLE_APPLICATION_CREDENTIALS=/app/config/credentials.json
    volumes:
      - ..:/app
      - seo-cache:/app/.seo-cache
      - seo-output:/app/output
    working_dir: /app
    command: python scripts/run_skill_workflow.py --help

  # Ollama for local LLM (free)
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    profiles:
      - local-llm

volumes:
  seo-cache:
  seo-output:
  ollama-data:

# Usage:
# docker-compose up claude-seo
# docker-compose --profile local-llm up  # Includes Ollama
# docker-compose run claude-seo python scripts/run_skill_workflow.py audit --url https://example.com

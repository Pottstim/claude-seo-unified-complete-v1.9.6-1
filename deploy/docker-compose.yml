version: '3.8'

services:
  api:
    build: .
    container_name: seo-api
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://seoapp:seopass@postgres:5432/seo_production
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - ./output:/app/output
      - ./.seo-cache:/app/.seo-cache
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: seo-postgres
    environment:
      POSTGRES_DB: seo_production
      POSTGRES_USER: seoapp
      POSTGRES_PASSWORD: seopass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: seo-redis
    volumes:
      - redis_data:/data
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: seo-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./deploy/ssl:/etc/nginx/ssl
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
